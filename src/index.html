<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MetaOWL - The Meta-Framework for Odoo OWL</title>
    <meta
      name="description"
      content="MetaOWL is a modern meta-framework for Odoo OWL on Vite. Discover the documentation and learn how to build powerful web applications with OWL."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://metaowl.org" />

    <link
      rel="icon"
      type="image/png"
      href="/images/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="shortcut icon" href="/images/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/images/apple-touch-icon.png"
    />
    <meta name="apple-mobile-web-app-title" content="MetaOWL" />
    <link rel="manifest" href="/images/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MetaOWL" />
    <meta
      property="og:title"
      content="MetaOWL - The Meta-Framework for Odoo OWL"
    />
    <meta
      property="og:description"
      content="MetaOWL is a modern meta-framework for Odoo OWL on Vite. Discover the documentation and learn how to build powerful web applications with OWL."
    />
    <meta property="og:url" content="https://metaowl.org" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="MetaOWL - The Meta-Framework for Odoo OWL"
    />
    <meta
      name="twitter:description"
      content="MetaOWL is a modern meta-framework for Odoo OWL on Vite. Discover the documentation and learn how to build powerful web applications with OWL."
    />
    <script>
      ;(function () {
        var saved = localStorage.getItem('theme')
        var prefersDark = window.matchMedia(
          '(prefers-color-scheme: dark)',
        ).matches
        var isDark = saved === 'dark' || (!saved && prefersDark)
        if (isDark) {
          document.documentElement.classList.add('dark')
        }
        document.addEventListener('DOMContentLoaded', function () {
          var favicon = document.querySelector(
            'link[rel="icon"][type="image/svg+xml"]',
          )
          if (
            favicon &&
            (saved === 'light' || (saved === null && !prefersDark))
          ) {
            favicon.href = '/images/logo.svg'
          } else if (favicon && isDark) {
            favicon.href = '/images/logo-darkmode.svg'
          }
        })
      })()
    </script>
    <script
      type="module"
      src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      src="https://rybbit.reamote.com/api/script.js"
      data-site-id="6707ed265dce"
      defer
    ></script>
  </head>
  <body>
    <div id="metaowl"></div>
    <script type="module" src="/metaowl.js"></script>
  </body>
</html>
